trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npx cypress run --browser chrome
    displayName: 'Run Cypress tests'
    continueOnError: true

  - script: npx mochawesome-merge "cypress/results/*.json" > cypress/results/merged.json
    condition: always()
    displayName: 'Merge mochawesome reports'

  - script: npx marge cypress/results/merged.json --reportDir cypress/results --inline -f index -o
    condition: always()
    displayName: 'Generate HTML report'

  - task: PublishPipelineArtifact@1
    condition: always()
    inputs:
      targetPath: 'cypress/results'
      artifact: 'mochawesome-report'
    displayName: 'Publish mochawesome HTML report'

  - task: PublishPipelineArtifact@1
    condition: failed()
    inputs:
      targetPath: 'cypress/screenshots'
      artifact: 'cypress-screenshots'
    displayName: 'Publish failure